[workspace]
authors = ["sopi <sopi@sopi.dev>"]
channels = ["robostack-jazzy", "conda-forge"]
name = "yp_spur_ros2"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
cmake = ">=4.4.0,<5"
clang-format = ">=22.1.8,<23"
clang-tools = ">=22.1.8,<23"
gcc_linux-64 = ">=15.2.0,<16"
gxx_linux-64 = ">=15.2.0,<16"
ninja = ">=1.13.2,<2"
pre-commit = ">=4.6.0,<5"
pkg-config = ">=0.29.2,<0.30"
ros-jazzy-ament-cmake = ">=2.5.6,<3"
ros-jazzy-geometry-msgs = ">=5.3.7,<6"
ros-jazzy-launch = ">=3.4.10,<4"
ros-jazzy-launch-ros = ">=0.26.11,<0.27"
ros-jazzy-nav-msgs = ">=5.3.7,<6"
ros-jazzy-rclcpp = ">=28.1.18,<29"
ros-jazzy-tf2-ros = ">=0.36.20,<0.37"

[tasks]
configure = "cmake -S . -B .build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_EXPORT_COMPILE_COMMANDS=ON"
build = { cmd = "cmake --build .build", depends-on = ["configure"] }
test = { cmd = "ctest --test-dir .build --output-on-failure", depends-on = ["build"] }
fmt = "find include src test -type f \\( -name '*.c' -o -name '*.cpp' -o -name '*.h' \\) -print0 | xargs -0 clang-format -i"
fmt-check = "find include src test -type f \\( -name '*.c' -o -name '*.cpp' -o -name '*.h' \\) -print0 | xargs -0 clang-format --dry-run --Werror"
lint = { cmd = "find include src test -type f \\( -name '*.c' -o -name '*.cpp' -o -name '*.h' \\) -print0 | xargs -0 clang-tidy -p .build", depends-on = ["configure"] }
hook-install = "pre-commit install --install-hooks"
check = { depends-on = ["fmt-check", "lint"] }
clean = "rm -rf .build"
